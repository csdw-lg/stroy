<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Loading...</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #111;
  font-family: Arial, "Microsoft YaHei";
}

/* 遮罩层 */
#a {
  display: flex;
  justify-content: flex-end;
  align-items: flex-start;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.92);
  padding: 40px;
  box-sizing: border-box;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.6s;
}

/* 箭头+手+文字容器 */
.b {
  position: relative;
  text-align: right;
  color: #fff;
  max-width: 220px;
}

/* 曲线箭头动画 */
.arrow-path {
  width: 80px;
  height: 80px;
  margin-bottom: 8px;
  transform-origin: bottom right;
  animation: arrowMove 1.2s infinite;
}

@keyframes arrowMove {
  0% { transform: translate(0,0) rotate(-45deg); }
  50% { transform: translate(8px,-8px) rotate(-45deg); }
  100% { transform: translate(0,0) rotate(-45deg); }
}

/* 手指动画 */
.hand {
  width: 40px;
  margin-bottom: 6px;
  animation: handScale 1.5s infinite;
}

@keyframes handScale {
  0% { transform: scale(1); }
  50% { transform: scale(0.85); }
  100% { transform: scale(1); }
}

/* 提示文字 */
.g {
  font-size: 18px;
  line-height: 1.4;
  font-weight: bold;
  color: #fff;
}

.h {
  color: #46ff00;
  font-size: 20px;
  font-weight: bold;
}

/* 页面加载提示文字 */
.i {
  text-align: center;
  margin-top: 120px;
  color: #aaa;
  font-size: 18px;
}

/* 遮罩淡出 */
#a.hidden {
  opacity: 0;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="a">
  <div class="b">
    <!-- 曲线箭头SVG -->
    <svg class="arrow-path" viewBox="0 0 50 50">
      <path d="M0,50 Q25,25 50,0" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
      <polygon points="50,0 42,0 50,8" fill="#fff"/>
    </svg>

    <!-- 手势SVG -->
    <svg class="hand" viewBox="0 0 64 64">
      <path fill="#fff" d="M32 6a6 6 0 00-6 6v20l-4-4a4 4 0 10-6 6l12 12a6 6 0 004 2h10a6 6 0 006-6V24a4 4 0 10-8 0v6h-2V12a6 6 0 00-6-6z"/>
    </svg>

    <!-- 提示文字 -->
    <div class="g">
      点击右上角 <span style="font-size:24px">•••</span><br>
      选择 <span class="h">在浏览器打开</span>
    </div>
  </div>
</div>

<div class="i">
  页面加载中...<br>
  如果没有跳转请刷新
</div>

<script>
// UA 检测
var u = navigator.userAgent.toLowerCase();
function isMobile(){ return /android|iphone|ipad|ipod|mobile/i.test(u); }
function isInternalBrowser(){ 
  return u.indexOf("micromessenger") > -1 ||
         u.indexOf("qq/") > -1 ||
         u.indexOf("weibo") > -1 ||
         u.indexOf("douyin") > -1;
}

// 遮罩显示逻辑
document.getElementById("a").style.display = "flex";

// 模拟加载完成后淡出遮罩
// 这里可以替换成实际页面加载完成事件
setTimeout(function(){
  var overlay = document.getElementById("a");
  overlay.classList.add('hidden');
}, 3000); // 3秒后淡出
</script>

</body>
</html>
