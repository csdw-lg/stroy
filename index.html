<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>请用外部浏览器打开</title>

<!-- GoatCounter（官方稳定版） -->
<script data-goatcounter="https://story.goatcounter.com/count"
async src="//gc.zgo.at/count.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#f0f2f5;font-family:"Microsoft YaHei",sans-serif;overflow:hidden;}
.loading-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#6b7280;font-size:15px;background:#f9fafc;}
.spinner{width:36px;height:36px;margin-bottom:12px;border:3px solid rgba(0,0,0,0.05);border-top-color:#07c160;border-radius:50%;animation:spin 0.9s infinite linear;}
@keyframes spin{to{transform:rotate(360deg);}}

#weixin-mask{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:10000;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
pointer-events:none;
}

.guide-container{
position:absolute;
top:12px;
right:12px;
display:flex;
flex-direction:column;
align-items:flex-end;
gap:8px;
max-width:240px;
}

.tip-card{
background:rgba(30,30,35,0.75);
border-radius:24px;
padding:10px 16px;
color:#fff;
font-size:16px;
line-height:1.3;
}
</style>
</head>

<body>

<div id="weixin-mask">
<div class="guide-container">
<div class="tip-card">
点击右上角 ••• <br>
选择 在浏览器打开 ↗
</div>
</div>
</div>

<div class="loading-placeholder" id="loading-placeholder">
<div class="spinner"></div>
<div>正在准备跳转…</div>
</div>

<script>
(function(){

var targetUrl="https://csdw-lg.github.io/from2/";
var mask=document.getElementById('weixin-mask');
var placeholder=document.getElementById('loading-placeholder');

function isWechat(){
return navigator.userAgent.toLowerCase().indexOf('micromessenger')!==-1;
}

function countEvent(name){
if(window.goatcounter && window.goatcounter.count){
window.goatcounter.count({path:name});
}
}

// 页面访问
setTimeout(function(){
countEvent('page_enter');
},80);

if(isWechat()){
mask.style.display='block';
placeholder.style.display='none';
countEvent('wechat_open');
}else{
countEvent('browser_open');

setTimeout(function(){
countEvent('jump_success');
window.location.href=targetUrl;
},120);
}

})();
</script>

</body>
</html>
