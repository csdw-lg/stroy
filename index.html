<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>请用外部浏览器打开</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body{width:100%;height:100%;background:#f0f2f5;font-family:"Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;overflow:hidden;}
.loading-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;color:#6b7280;font-size:15px;background:#f9fafc;}
.spinner{width:36px;height:36px;margin-bottom:12px;border:3px solid rgba(0,0,0,0.05);border-top-color:#07c160;border-radius:50%;animation:spin 0.9s infinite linear;}
@keyframes spin{to{transform:rotate(360deg);}}
#weixin-mask{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px) brightness(0.9);-webkit-backdrop-filter:blur(10px) brightness(0.9);pointer-events:none;}
.guide-container{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;align-items:flex-end;gap:8px;max-width:240px;}
.finger-wrapper{position:relative;width:60px;height:60px;}
.finger-svg{width:60px;height:60px;fill:url(#fingerGradient);animation:fingerSoftTap 2s infinite ease-in-out;}
@keyframes fingerSoftTap{0%,100%{transform:scale(1);}50%{transform:scale(1.05) translateY(-3px);}}
.ripple{position:absolute;top:6px;right:2px;width:52px;height:52px;border-radius:50%;background:rgba(255,215,100,0.15);animation:rippleWave 2.4s infinite;}
@keyframes rippleWave{0%{transform:scale(0.7);opacity:0.6;}100%{transform:scale(2);opacity:0;}}
.tip-card{background:rgba(30,30,35,0.75);backdrop-filter:blur(8px);border-radius:24px;padding:10px 16px;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:16px;line-height:1.3;}
.dots-icon{font-size:22px;}
.highlight-text{color:#b7ff8c;font-weight:600;}
.mini-arrow{margin-left:4px;font-size:20px;}
@media (max-width:360px){.tip-card{font-size:15px;padding:8px 14px;}.finger-wrapper,.finger-svg{width:52px;height:52px;}}
</style>
</head>

<body>

<svg width="0" height="0" style="position:absolute;">
  <defs>
    <linearGradient id="fingerGradient" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="70%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF6F3C"/>
    </linearGradient>
  </defs>
</svg>

<div id="weixin-mask">
  <div class="guide-container">
    <div class="finger-wrapper">
      <svg class="finger-svg" viewBox="0 0 64 64">
        <path d="M30 6c-4.4 0-8 3.6-8 8v20l-5-5c-3-3-7.8-3-10.8 0s-3 7.8 0 10.8l14 14c2 2 4.8 3.2 7.8 3.2h12c6 0 10.8-4.8 10.8-10.8V26c0-4.4-3.6-8-8-8s-8 3.6-8 8v6h-2V14c0-4.4-3.6-8-8-8z"/>
      </svg>
      <div class="ripple"></div>
    </div>
    <div class="tip-card" id="wechat-open-card">
      点击右上角 <span class="dots-icon">•••</span><br>
      选择 <span class="highlight-text">在浏览器打开</span> <span class="mini-arrow">↗</span>
    </div>
  </div>
</div>

<div class="loading-placeholder" id="loading-placeholder">
  <div class="spinner"></div>
  <div>正在准备跳转…</div>
</div>

<script>
(function(){
  var targetUrl = "https://csdw-lg.github.io/from2/";
  var mask = document.getElementById('weixin-mask');
  var placeholder = document.getElementById('loading-placeholder');
  var wechatCard = document.getElementById('wechat-open-card');

  function isWechat(){ return navigator.userAgent.toLowerCase().indexOf('micromessenger') !== -1; }

  function countEvent(name){
    if(window.goatcounter && window.goatcounter.count){
      window.goatcounter.count({path:name});
    } else {
      setTimeout(function(){
        if(window.goatcounter && window.goatcounter.count){
          window.goatcounter.count({path:name});
        }
      },50);
    }
  }

  // 异步加载 GoatCounter
  var script = document.createElement('script');
  script.src = "//gc.zgo.at/count.js";
  script.async = true;
  script.onload = function(){
    countEvent('page_enter');

    if(isWechat()){
      if(mask) mask.style.display='block';
      if(placeholder) placeholder.style.opacity='0.4';
      countEvent('wechat_open');

      // 微信内点击“在浏览器打开”统计
      wechatCard.addEventListener('click', function(){
        countEvent('wechat_jump'); // 微信跳转统计
      });

    } else {
      countEvent('browser_open');
      setTimeout(function(){
        countEvent('jump_success');
        window.location.href = targetUrl;
      }, 100);
    }
  };
  document.head.appendChild(script);
})();
</script>

</body>
</html>
