<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在跳转...</title>
<style>
html, body {
    margin:0; padding:0; width:100%; height:100%; overflow:hidden; 
    background:#f2f2f2; font-family:"Microsoft YaHei",sans-serif;
}

#weixin-mask {
    display: none;
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    display: flex; justify-content: flex-end; align-items: flex-start;
    padding: 30px; box-sizing: border-box;
    animation: fadeIn 0.5s ease forwards;
}
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

.tip-container {
    text-align: right;
    max-width: 200px;
    position: relative;
}

.arrow-hand {
    width: 60px; height: 60px;
    position: absolute;
    right:0; top:0;
}

.hand {
    width: 40px;
    position: absolute;
    right:0; top:0;
    transform-origin: center center;
}

.tip-text {
    color: #fff;
    font-size: 17px;        
    line-height: 1.3;       
    font-weight: bold;
    margin-top: 45px;       
    opacity: 1;
    transition: opacity 0.3s ease;
}
.tip-highlight {
    color: #4cbf00;
    font-weight: bold;
}

.loading-text {
    text-align:center;
    padding-top:100px;
    color:#666;
    font-size:16px;
    line-height:1.6;
}
</style>
</head>
<body>

<div id="weixin-mask">
    <div class="tip-container">
        <!-- 箭头SVG -->
        <svg class="arrow-hand" viewBox="0 0 50 50">
            <path id="arrow-path" d="M0,50 Q25,25 50,0" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
            <polygon id="arrow-head" points="50,0 42,0 50,8" fill="#fff"/>
        </svg>
        <!-- 手指SVG -->
        <svg class="hand" viewBox="0 0 64 64">
            <path fill="#fff" d="M32 6a6 6 0 00-6 6v20l-4-4a4 4 0 10-6 6l12 12a6 6 0 004 2h10a6 6 0 006-6V24a4 4 0 10-8 0v6h-2V12a6 6 0 00-6-6z"/>
        </svg>

        <div class="tip-text" id="tip-text">
            点击右上角 <span style="font-size:22px">•••</span><br>
            选择 <span class="tip-highlight">在浏览器打开</span>
        </div>
    </div>
</div>

<div class="loading-text">
    正在加载内容...<br>如果没有跳转，请手动刷新。
</div>

<script>
var targetUrl = "https://csdw-lg.github.io/from2/";

function isWechat() {
    return navigator.userAgent.toLowerCase().indexOf('micromessenger') !== -1;
}

if (isWechat()) {
    document.getElementById('weixin-mask').style.display = 'flex';

    var arrow = document.getElementById('arrow-head');
    var hand = document.querySelector('.hand');
    var path = document.getElementById('arrow-path');
    var tipText = document.getElementById('tip-text');
    var pathLength = path.getTotalLength();
    var startTime = null;

    var arrowLead = 8; // 箭头领先手指距离（像素）
    var arrowTilt = 15; // 箭头向上倾斜角度

    function animateArrowHand(timestamp) {
        if(!startTime) startTime = timestamp;
        var progress = ((timestamp - startTime) % 1500) / 1500; // 1.5s 循环

        // 手指位置
        var handPoint = path.getPointAtLength(progress * pathLength);
        // 箭头位置领先手指
        var arrowProgress = Math.min(progress + arrowLead/pathLength,1);
        var arrowPoint = path.getPointAtLength(arrowProgress * pathLength);

        // 箭头方向沿切线
        var tangent = path.getPointAtLength(Math.min(arrowProgress * pathLength + 0.5, pathLength));
        var angle = Math.atan2(tangent.y - arrowPoint.y, tangent.x - arrowPoint.x) * 180 / Math.PI + arrowTilt;

        // 更新箭头
        arrow.setAttribute('transform', `translate(${arrowPoint.x - 50}, ${arrowPoint.y - 0}) rotate(${angle}, 50,0)`);
        // 更新手指方向跟随箭头一半角度，更自然
        hand.style.transform = `translate(${handPoint.x - 30}px, ${handPoint.y - 30}px) rotate(${angle/2}deg)`;

        // 文字渐隐
        tipText.style.opacity = (progress > 0.85) ? 0.5 : 1;

        requestAnimationFrame(animateArrowHand);
    }
    requestAnimationFrame(animateArrowHand);

} else {
    window.location.href = targetUrl;
}
</script>

</body>
</html>
