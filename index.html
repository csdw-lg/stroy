<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Loading</title>
</head>

<body>

<script>

var main="https://csdw-lg.github.io/from2/"
var backup="https://csdw-lg.github.io/from2/"

var ua=navigator.userAgent.toLowerCase()

function isWechat(){
return ua.indexOf("micromessenger")>-1
}

function go(url){
setTimeout(function(){
location.replace(url)
},Math.random()*400+200)
}

if(isWechat()){
document.write("请点击右上角在浏览器打开")
}else{
go("https://"+main)
}

</script>

</body>
</html>
