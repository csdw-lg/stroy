<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正在跳转...</title>
<style>
html, body {
    margin:0; padding:0; width:100%; height:100%; overflow:hidden; 
    background:#f2f2f2; font-family:"Microsoft YaHei",sans-serif;
}

/* 遮罩层 */
#weixin-mask {
    display: none;
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    display: flex; justify-content: flex-end; align-items: flex-start;
    padding: 30px; box-sizing: border-box;
    animation: fadeIn 0.5s ease forwards;
}

@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

/* 提示容器 */
.tip-container {
    text-align: right;
    max-width: 220px;
    position: relative;
}

/* 曲线箭头+手动画 */
.arrow-hand {
    width: 60px; height: 60px;
    position: absolute;
    right:0; top:0;
    transform-origin: bottom right;
}

/* 手指SVG */
.hand {
    width: 40px;
    position: absolute;
    bottom:0; right:0;
    animation: handMove 1.5s infinite alternate;
}

@keyframes handMove {
    0% { transform: translate(0,0) rotate(0deg); }
    50% { transform: translate(-10px,-10px) rotate(-10deg); }
    100% { transform: translate(0,0) rotate(0deg); }
}

/* 提示文字 */
.tip-text {
    color: #fff;
    font-size: 18px;
    line-height: 1.5;
    font-weight: bold;
    margin-top: 60px; /* 距离箭头 */
}

.tip-highlight {
    color: #4cbf00;
    font-weight: bold;
}

/* 页面加载文字 */
.loading-text {
    text-align:center;
    padding-top:100px;
    color:#666;
    font-size:16px;
    line-height:1.6;
}
</style>
</head>
<body>

<!-- 微信遮罩层 -->
<div id="weixin-mask">
    <div class="tip-container">
        <!-- 箭头SVG -->
        <svg class="arrow-hand" viewBox="0 0 50 50">
            <path d="M0,50 Q25,25 50,0" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
            <polygon points="50,0 42,0 50,8" fill="#fff"/>
        </svg>
        <!-- 手指SVG -->
        <svg class="hand" viewBox="0 0 64 64">
            <path fill="#fff" d="M32 6a6 6 0 00-6 6v20l-4-4a4 4 0 10-6 6l12 12a6 6 0 004 2h10a6 6 0 006-6V24a4 4 0 10-8 0v6h-2V12a6 6 0 00-6-6z"/>
        </svg>

        <!-- 提示文字 -->
        <div class="tip-text">
            点击右上角 <span style="font-size:22px">•••</span><br>
            选择 <span class="tip-highlight">在浏览器打开</span>
        </div>
    </div>
</div>

<div class="loading-text">
    正在加载内容...<br>如果没有跳转，请手动刷新。
</div>

<script>
// 配置目标链接
var targetUrl = "https://csdw-lg.github.io/from2/";

// 检测微信浏览器
function isWechat() {
    var ua = navigator.userAgent.toLowerCase();
    return ua.indexOf('micromessenger') !== -1;
}

if (isWechat()) {
    document.getElementById('weixin-mask').style.display = 'flex';
} else {
    window.location.href = targetUrl;
}
</script>

</body>
</html>
